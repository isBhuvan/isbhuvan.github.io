name: Improvement
description: Suggest an enhancement or feature
title: "feat: "
labels: ["enhancement"]
assignees:
  - isbhuvan

body:
  - type: markdown
    attributes:
      value: |
        ## 🚀 Improvement Proposal

        Describe the enhancement clearly and concisely.

  - type: input
    id: summary
    attributes:
      label: Summary
      placeholder: Add pagination to blogs page
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this solve?
      placeholder: Blogs page becomes long and hard to navigate after 20+ posts
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: Describe the proposed approach
      placeholder: Implement client-side pagination showing 6 posts per page
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Optional – describe other approaches

  - type: dropdown
    id: impact
    attributes:
      label: Impact Level
      options:
        - Low (UI polish)
        - Medium (UX enhancement)
        - High (Structural change)
    validations:
      required: true